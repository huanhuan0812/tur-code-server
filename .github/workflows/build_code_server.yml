name: Build code-server 4.125.0 for TUR

on:
  workflow_dispatch:
  push:
    paths:
      - 'tur/code-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y zstd

      - name: 执行 setup-environment.sh（TUR 标准初始化）
        run: |
          chmod +x setup-environment.sh
          ./setup-environment.sh
          echo "=== 验证目录结构 ==="
          ls -la scripts/ 2>/dev/null || echo "scripts/ 目录不存在"
          ls -la build-package.sh 2>/dev/null || echo "build-package.sh 不存在"

      - name: 拉取 Termux 构建镜像
        run: |
          docker pull ghcr.io/termux/package-builder:latest

      - name: 编译 code-server
        run: |
          docker run --rm \
            -v $PWD:/home/builder/tur-code-server \
            -w /home/builder/tur-code-server \
            ghcr.io/termux/package-builder:latest \
            bash -c "
              set -e
              echo '=========================================='
              echo '开始编译 code-server 4.125.0'
              echo '当前用户: ' && whoami
              echo '当前目录: ' && pwd
              echo '=========================================='

              if [ ! -f build-package.sh ]; then
                echo '下载 build-package.sh...'
                wget -q https://raw.githubusercontent.com/termux/termux-packages/master/build-package.sh
                chmod +x build-package.sh
              fi

              if [ ! -f tur/code-server/build.sh ]; then
                echo '错误: 找不到 tur/code-server/build.sh'
                exit 1
              fi

              echo '开始编译 (aarch64)...'
              TERMUX_INSTALL_DEPS=true \
              TERMUX_NO_CLEAN=true \
              ./build-package.sh -a aarch64 code-server

              echo '=========================================='
              echo '编译完成！'
              echo '=========================================='
            "

      - name: 查找 .deb 文件
        run: |
          echo "=== 查找 .deb 文件 ==="
          find . -name "*.deb" -type f 2>/dev/null || echo "未找到 .deb 文件"
          if [ -d debs ]; then
            ls -la debs/
          else
            echo "debs/ 目录不存在"
          fi

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: code-server-deb
          path: |
            debs/*.deb
            **/*.deb
          if-no-files-found: warn
