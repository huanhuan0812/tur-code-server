name: Build code-server with TUR CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'tur/code-server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y zstd

      - name: 设置构建环境
        run: |
          chmod +x setup-environment.sh
          ./setup-environment.sh
          
          # 确保 run-docker.sh 存在并可执行
          chmod +x scripts/run-docker.sh
          chmod +x continuous-build-wrapper.sh
          chmod +x build-package.sh

      - name: 使用 run-docker.sh 编译 code-server
        run: |
          # 方法1: 直接调用 run-docker.sh 进入容器并执行编译
          ./scripts/run-docker.sh bash -c "
            cd /home/builder/tur-code-server && \
            TERMUX_INSTALL_DEPS=true ./build-package.sh -a aarch64 code-server
          "
          
          # 或者方法2: 使用 continuous-build-wrapper.sh（它内部会调用 run-docker.sh）
          # ./continuous-build-wrapper.sh ./build-package.sh -a aarch64 code-server

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: code-server-deb
          path: |
            debs/*.deb
            output/*.deb
