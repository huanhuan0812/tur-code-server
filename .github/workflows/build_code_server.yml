name: Build code-server 4.125.0 for TUR

on:
  workflow_dispatch:
  push:
    paths:
      - 'tur/code-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y zstd unzip wget

      - name: 安装 Android NDK r29
        run: |
          echo "=== 安装 Android NDK r29 ==="
          mkdir -p /home/runner/lib
          cd /home/runner/lib
          
          # 下载 NDK r29
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          
          # 解压
          unzip -q android-ndk-r29-linux.zip
          
          # 清理 zip 文件
          rm android-ndk-r29-linux.zip
          
          # 验证安装
          if [ -d "/home/runner/lib/android-ndk-r29" ]; then
            echo "✅ NDK 安装成功"
            ls -la /home/runner/lib/android-ndk-r29/
          else
            echo "❌ NDK 安装失败"
            exit 1
          fi
          
          # 设置环境变量
          echo "NDK=/home/runner/lib/android-ndk-r29" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/home/runner/lib/android-ndk-r29" >> $GITHUB_ENV
          echo "PATH=/home/runner/lib/android-ndk-r29/bin:$PATH" >> $GITHUB_ENV

      - name: 执行 setup-environment.sh（TUR 标准初始化）
        run: |
          chmod +x setup-environment.sh
          ./setup-environment.sh
          echo "=== 验证目录结构 ==="
          ls -la scripts/ 2>/dev/null || echo "scripts/ 目录不存在"
          ls -la build-package.sh 2>/dev/null || echo "build-package.sh 不存在"
          
          # 验证 NDK 环境变量是否生效
          echo "=== NDK 环境变量 ==="
          echo "NDK: $NDK"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          
          # 检查 NDK 目录权限
          echo "=== NDK 目录权限 ==="
          ls -la /home/runner/lib/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/bin/ || echo "NDK 工具链不存在"

      - name: 编译 code-server（带详细日志）
        run: |
          echo '=========================================='
          echo '开始编译 code-server 4.125.0'
          echo '当前用户: ' && whoami
          echo '当前目录: ' && pwd
          echo '=========================================='
          
          # 检查环境变量
          echo "=== 环境变量检查 ==="
          echo "TERMUX_INSTALL_DEPS: $TERMUX_INSTALL_DEPS"
          echo "TERMUX_NO_CLEAN: $TERMUX_NO_CLEAN"
          echo "NDK: $NDK"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "PATH: $PATH"
          
          # 检查 build-package.sh 是否存在
          if [ ! -f "./build-package.sh" ]; then
            echo "❌ build-package.sh 不存在！"
            exit 1
          fi
          
          # 查看 build-package.sh 内容（前100行）
          echo "=== build-package.sh 开头内容 ==="
          head -20 ./build-package.sh
          
          echo '开始编译 (aarch64)...'
          
          # 使用 bash -x 来显示详细执行过程
          bash -x ./build-package.sh -a aarch64 code-server 2>&1 | tee build.log
          
          # 检查编译是否成功
          if [ $? -ne 0 ]; then
            echo "❌ 编译失败！查看最后100行日志："
            tail -100 build.log
            exit 1
          fi

          echo '=========================================='
          echo '编译完成！'
          echo '=========================================='

      - name: 查找 .deb 文件
        run: |
          echo "=== 查找 .deb 文件 ==="
          find . -name "*.deb" -type f 2>/dev/null || echo "未找到 .deb 文件"
          if [ -d debs ]; then
            ls -la debs/
          else
            echo "debs/ 目录不存在"
          fi

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: code-server-deb
          path: |
            debs/*.deb
            **/*.deb
          if-no-files-found: warn

      - name: 上传编译日志（如果失败）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log