name: Build code-server 4.125.0 for TUR

on:
  workflow_dispatch:
  push:
    paths:
      - 'tur/code-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y zstd unzip wget

      - name: 安装 Android NDK r29
        run: |
          echo "=== 安装 Android NDK r29 ==="
          mkdir -p /home/runner/lib
          cd /home/runner/lib
          
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          rm android-ndk-r29-linux.zip
          
          if [ -d "/home/runner/lib/android-ndk-r29" ]; then
            echo "✅ NDK 安装成功"
          else
            echo "❌ NDK 安装失败"
            exit 1
          fi
          
          echo "NDK=/home/runner/lib/android-ndk-r29" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/home/runner/lib/android-ndk-r29" >> $GITHUB_ENV
          echo "PATH=/home/runner/lib/android-ndk-r29/bin:$PATH" >> $GITHUB_ENV

      - name: 设置 Termux 环境变量
        run: |
          # 设置 Termux 架构
          echo "TERMUX_ARCH=aarch64" >> $GITHUB_ENV
          echo "TERMUX_PREFIX=/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_BASE_DIR=/data/data/com.termux/files" >> $GITHUB_ENV
          
          # 创建模拟的 Termux 目录结构
          sudo mkdir -p /data/data/com.termux/files/usr
          sudo mkdir -p /data/data/com.termux/files/home
          
          # 创建 TERMUX_ARCH 文件
          echo "aarch64" | sudo tee /data/TERMUX_ARCH
          echo "TERMUX_ARCH 文件已创建"
          cat /data/TERMUX_ARCH

      - name: 执行 setup-environment.sh（TUR 标准初始化）
        run: |
          chmod +x setup-environment.sh
          ./setup-environment.sh
          echo "=== 验证目录结构 ==="
          ls -la scripts/ 2>/dev/null || echo "scripts/ 目录不存在"
          ls -la build-package.sh 2>/dev/null || echo "build-package.sh 不存在"

      - name: 编译 code-server
        run: |
          echo '=========================================='
          echo '开始编译 code-server 4.125.0'
          echo '当前用户: ' && whoami
          echo '当前目录: ' && pwd
          echo '=========================================='
          
          echo "=== 环境变量 ==="
          echo "TERMUX_ARCH: $TERMUX_ARCH"
          echo "TERMUX_PREFIX: $TERMUX_PREFIX"
          echo "NDK: $NDK"
          
          echo '开始编译 (aarch64)...'
          TERMUX_INSTALL_DEPS=true TERMUX_NO_CLEAN=true ./build-package.sh -a aarch64 code-server

          echo '=========================================='
          echo '编译完成！'
          echo '=========================================='

      - name: 查找 .deb 文件
        run: |
          echo "=== 查找 .deb 文件 ==="
          find . -name "*.deb" -type f 2>/dev/null || echo "未找到 .deb 文件"
          if [ -d debs ]; then
            ls -la debs/
          else
            echo "debs/ 目录不存在"
          fi

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: code-server-deb
          path: |
            debs/*.deb
            **/*.deb
          if-no-files-found: warn